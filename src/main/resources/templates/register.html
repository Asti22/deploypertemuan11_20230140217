<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Akun - Sistem Informasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 0;
        }
        .register-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(166, 173, 201, 0.25);
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            transition: transform 0.3s ease;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid #ced4da;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }
        .input-group-text {
            background-color: transparent;
            border-top-right-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
            cursor: pointer;
            color: #6c757d;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
            background: linear-gradient(135deg, #059669 0%, #065f46 100%);
        }
        .brand-icon {
            width: 48px;
            height: 48px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 24px;
            margin: 0 auto 16px auto;
        }
        textarea.form-control {
            resize: none;
        }
    </style>
</head>
<body>

<div class="card register-card p-4 m-3">
    <div class="card-body">
        <div class="brand-icon">
            <i class="bi bi-person-plus-fill"></i>
        </div>

        <h3 class="text-center fw-bold text-dark mb-1">Daftar Akun</h3>
        <p class="text-center text-muted small mb-4">Lengkapi data di bawah untuk membuat akun baru</p>

        <form th:action="@{/register}" th:object="${request}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="username" class="form-label small fw-semibold text-secondary">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Username" required autocomplete="off">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Password" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" required>
                        <span class="input-group-text" id="togglePassword">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="nama" class="form-label small fw-semibold text-secondary">Nama Lengkap</label>
                <input type="text" id="nama" th:field="*{nama}" class="form-control" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="mb-4">
                <label for="alamat" class="form-label small fw-semibold text-secondary">Alamat</label>
                <textarea id="alamat" th:field="*{alamat}" class="form-control" rows="3" placeholder="Masukkan alamat lengkap sesuai KTP" required></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2.5">Registrasi Sekarang</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">Sudah punya akun? <a th:href="@{/login}" class="text-decoration-none fw-semibold" style="color: #10b981;">Login di sini</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
     const togglePassword = document.querySelector('#togglePassword');
     const password = document.querySelector('#password');
     const eyeIcon = document.querySelector('#eyeIcon');

     togglePassword.addEventListener('click', function () {
         const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
         password.setAttribute('type', type);

         // Toggle icon mata
         eyeIcon.classList.toggle('bi-eye');
         eyeIcon.classList.toggle('bi-eye-slash');
     });
</script>
</body>
</html>
