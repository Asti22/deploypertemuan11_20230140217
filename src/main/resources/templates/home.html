<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Home - Sistem Informasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Navbar Custom Styling */
        .navbar-custom {
            background: #ffffff;
            box-shadow: 0 2px 10px rgba(166, 173, 201, 0.2);
            border-bottom: 1px solid rgba(228, 232, 240, 0.7);
        }
        .navbar-brand {
            color: #1e1b4b !important;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .btn-logout {
            border: 1px solid #ef4444;
            color: #ef4444;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-logout:hover {
            background-color: #ef4444;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }

        /* Profile Card Styling */
        .profile-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(166, 173, 201, 0.25);
            background: #ffffff;
            overflow: hidden;
        }
        .card-header-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            height: 100px;
            position: relative;
        }
        .avatar-container {
            margin-top: -50px;
            position: relative;
            z-index: 2;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            font-size: 40px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        /* Data Row Custom */
        .info-item {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }
        .info-item:hover {
            background-color: #f1f5f9;
            transform: translateX(2px);
        }
        .info-icon {
            width: 36px;
            height: 36px;
            background-color: rgba(79, 70, 229, 0.08);
            color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom mb-5 py-3">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <i class="bi bi-grid-1x2-fill text-primary"></i> Sistem Informasi
        </a>
        <div class="ms-auto">
            <a th:href="@{/logout}" class="btn btn-logout btn-sm px-3 py-2 d-flex align-items-center gap-2">
                <i class="bi bi-box-arrow-right"></i> Keluar
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card profile-card">
                <div class="card-header-gradient"></div>

                <div class="card-body p-4 pt-0 text-center">
                    <div class="avatar-container mb-3">
                        <div class="profile-avatar" th:text="${#strings.substring(profile.nama,0,1).toUpperCase()}">U</div>
                    </div>

                    <h3 class="fw-bold text-dark mb-1" th:text="${profile.nama}">Nama Lengkap</h3>
                    <p class="text-muted small mb-4">
                        <span class="badge bg-light text-secondary border px-2 py-1.5 rounded-pill">
                            <i class="bi bi-at text-primary"></i><span th:text="${user.username}">username</span>
                        </span>
                    </p>

                    <div class="text-start mt-4 d-flex flex-column gap-3">

                        <div class="info-item d-flex align-items-center gap-3">
                            <div class="info-icon">
                                <i class="bi bi-person-badge"></i>
                            </div>
                            <div>
                                <label class="text-muted d-block small text-uppercase fw-bold" style="font-size: 11px; letter-spacing: 0.5px;">Username Akun</label>
                                <span class="fw-semibold text-dark" th:text="${user.username}">-</span>
                            </div>
                        </div>

                        <div class="info-item d-flex align-items-center gap-3">
                            <div class="info-icon">
                                <i class="bi bi-card-text"></i>
                            </div>
                            <div>
                                <label class="text-muted d-block small text-uppercase fw-bold" style="font-size: 11px; letter-spacing: 0.5px;">Nama Lengkap</label>
                                <span class="fw-semibold text-dark" th:text="${profile.nama}">-</span>
                            </div>
                        </div>

                        <div class="info-item d-flex align-items-center gap-3">
                            <div class="info-icon">
                                <i class="bi bi-geo-alt"></i>
                            </div>
                            <div class="w-100">
                                <label class="text-muted d-block small text-uppercase fw-bold" style="font-size: 11px; letter-spacing: 0.5px;">Alamat Tinggal</label>
                                <span class="fw-semibold text-dark" th:text="${profile.alamat}">-</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
