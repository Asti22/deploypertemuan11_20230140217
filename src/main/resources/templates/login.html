<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Informasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(166, 173, 201, 0.25);
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            transition: transform 0.3s ease;
        }
        .form-control {
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid #ced4da;
            transition: all 0.2s ease-in-out;
        }
        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }
        .input-group-text {
            background-color: transparent;
            border-top-right-radius: 8px !important;
            border-bottom-right-radius: 8px !important;
            cursor: pointer;
            color: #6c757d;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
            background: linear-gradient(135deg, #4338ca 0%, #2e267d 100%);
        }
        .alert {
            border-radius: 8px;
            border: none;
        }
        .brand-icon {
            width: 48px;
            height: 48px;
            background: rgba(79, 70, 229, 0.1);
            color: #4f46e5;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 24px;
            margin: 0 auto 16px auto;
        }
    </style>
</head>
<body>

<div class="card login-card p-4 m-3">
    <div class="card-body">
        <div class="brand-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h3 class="text-center fw-bold text-dark mb-1">Selamat Datang</h3>
        <p class="text-center text-muted small mb-4">Silakan masuk menggunakan akun Anda</p>

        <div th:if="${param.error}" class="alert alert-danger text-center small p-3 mb-3 d-flex align-items-center justify-content-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> Username atau password salah!
        </div>

        <div th:if="${param.logout}" class="alert alert-success text-center small p-3 mb-3 d-flex align-items-center justify-content-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i> Anda telah berhasil logout.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold text-secondary">Username</label>
                <div class="input-group">
                    <input type="text" id="username" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
                <div class="input-group">
                    <input type="password" id="password" name="password" class="form-control" placeholder="Masukkan password" style="border-top-right-radius: 0; border-bottom-right-radius: 0;" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2.5">Masuk ke Sistem</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">Belum punya akun? <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color: #4f46e5;">Daftar Sekarang</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Script interaktif untuk Show/Hide Password
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);

        // Ubah icon mata sesuai status
        eyeIcon.classList.toggle('bi-eye');
        eyeIcon.classList.toggle('bi-eye-slash');
    });
</script>
</body>
</html>
